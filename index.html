<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <title>RWD Viewer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <span class="app-logo">RWD Viewer</span>
        <div class="url-form">
          <input
            type="url"
            id="url-input"
            placeholder="https://example.com"
            autocomplete="url"
            spellcheck="false"
          />
          <button class="btn btn-primary" id="load-btn">Load</button>
          <button class="btn btn-secondary" id="add-viewport-btn">+ Add viewport</button>
        </div>
        <div class="sync-status" id="sync-status" title="Scroll synchronisation status"></div>
      </header>

      <main id="viewports-container">
        <!-- Viewport columns are injected here by JS -->
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
